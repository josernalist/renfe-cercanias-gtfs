name: Fetch Cercanías GTFS

on:
  workflow_dispatch:
  repository_dispatch:
    types: [fetch-cercanias-gtfs]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch GTFS data
        run: python scripts/fetch_gtfs.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "gtfs-cercanias $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
